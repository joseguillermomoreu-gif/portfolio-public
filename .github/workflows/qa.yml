name: Quality Assurance

on:
  push:
    branches: [master]

jobs:
  # ==========================================
  # JOB 1: QA PHP & BACKEND
  # ==========================================
  qa-php:
    name: QA PHP & Backend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, zip, curl, intl
          tools: composer:v2
          coverage: xdebug

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-composer-

      - name: 📦 Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: ✅ Validate composer.json
        run: composer validate --strict

      - name: 🧪 Run PHPUnit Tests
        run: vendor/bin/phpunit --testdox --colors=always --coverage-html coverage/

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: 🔍 Run PHPStan Analysis (level 9)
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: 🎨 Check Code Style (PHP CS Fixer)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php

  # ==========================================
  # JOB 2: QA ESLINT
  # ==========================================
  qa-eslint:
    name: QA ESLint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎭 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Node dependencies
        run: npm ci

      - name: 🔍 Run ESLint (TypeScript/Playwright)
        run: npm run lint

  # ==========================================
  # JOB 3: QA E2E PRODUCTION
  # ==========================================
  qa-e2e-prod:
    name: QA E2E Production
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: make build

      - name: 🎭 Run E2E Tests (Production)
        run: docker compose run --rm -e BASE_URL=https://josemoreupeso.es web npm test

  # ==========================================
  # QA STATUS (gate)
  # ==========================================
  qa-summary:
    name: QA Status
    runs-on: ubuntu-latest
    needs: [qa-php, qa-eslint, qa-e2e-prod]
    if: always()

    steps:
      - name: ✅ QA Passed
        if: |
          needs['qa-php'].result == 'success' &&
          needs['qa-eslint'].result == 'success' &&
          needs['qa-e2e-prod'].result == 'success'
        run: |
          echo "✅ QUALITY CHECKS PASSED!"
          echo ""
          echo "✓ PHP Backend (PHPUnit + PHPStan + CS Fixer): ${{ needs['qa-php'].result }}"
          echo "✓ ESLint (TypeScript/Playwright):             ${{ needs['qa-eslint'].result }}"
          echo "✓ E2E Production:                             ${{ needs['qa-e2e-prod'].result }}"
          echo ""
          echo "Commit: ${{ github.sha }}"

      - name: ❌ QA Failed
        if: |
          needs['qa-php'].result == 'failure' ||
          needs['qa-eslint'].result == 'failure' ||
          needs['qa-e2e-prod'].result == 'failure'
        run: |
          echo "❌ QUALITY CHECKS FAILED!"
          echo ""
          echo "PHP Backend: ${{ needs['qa-php'].result }}"
          echo "ESLint:      ${{ needs['qa-eslint'].result }}"
          echo "E2E Prod:    ${{ needs['qa-e2e-prod'].result }}"
          echo ""
          echo "Please check the logs above for details."
          exit 1
